<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Registration Sync - LifeCharter Incubator</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #F5F1E8;
            --fog: #DAD2B9;
            --sage: #ADB8A0;
            --ochre: #C4B792;
            --clay: #CBA488;
            --ink: #2F312F;
            --linework: #8F8875;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-family: 'EB Garamond', serif;
            font-size: 32px;
            color: var(--ink);
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: var(--linework);
            margin-bottom: 40px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--ink);
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--fog);
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Open Sans', sans-serif;
            background: white;
        }
        
        input:focus {
            outline: none;
            border-color: var(--clay);
        }
        
        .btn-primary {
            background: var(--clay);
            color: white;
            border: none;
            padding: 18px 48px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Open Sans', sans-serif;
            width: 100%;
            margin-top: 20px;
        }
        
        .btn-primary:hover {
            background: var(--ochre);
        }
        
        .btn-primary:disabled {
            background: var(--fog);
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            color: #2e7d32;
            display: block;
        }
        
        .result.error {
            background: #ffebee;
            border: 1px solid #ef5350;
            color: #c62828;
            display: block;
        }
        
        .info-box {
            background: var(--fog);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid var(--ochre);
        }
        
        .info-box h3 {
            font-family: 'EB Garamond', serif;
            margin-bottom: 10px;
        }
        
        .info-box p {
            font-size: 14px;
            color: var(--linework);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Manual Registration Sync</h1>
        <p class="subtitle">LifeCharter Incubator to Global Control</p>
        
        <div class="info-box">
            <h3>⚠️ Admin Use Only</h3>
            <p>This page is for manually syncing Incubator registrations to Global Control CRM. Use this when automatic sync is not available. The registration will be tagged with "incubator-registration" in Global Control.</p>
        </div>
        
        <form id="syncForm">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" name="fullName" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>
            
            <div class="form-group">
                <label for="phone">Phone *</label>
                <input type="tel" id="phone" name="phone" required placeholder="+1 (555) 123-4567">
            </div>
            
            <div class="form-group">
                <label for="whatsapp">WhatsApp (optional)</label>
                <input type="tel" id="whatsapp" name="whatsapp" placeholder="+1 (555) 123-4567">
            </div>
            
            <button type="submit" class="btn-primary" id="submitBtn">Sync to Global Control</button>
        </form>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        // Global Control API Configuration
        const GC_API_KEY = '1a43470a5286cb999b708630d70ebf8888bccc8d28486e10d89c5c25b532f88a';
        const GC_API_URL = 'https://api.globalcontrol.io/api/ai';
        const TAG_ID = '69fa1666f047865f2e391269'; // incubator-registration tag
        
        document.getElementById('syncForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Syncing...';
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';
            
            // Get form data
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            
            // Parse name
            const nameParts = fullName.split(' ');
            const firstName = nameParts[0];
            const lastName = nameParts.slice(1).join(' ') || '';
            
            try {
                // Step 1: Create contact in Global Control
                const contactResponse = await fetch(`${GC_API_URL}/contacts`, {
                    method: 'POST',
                    headers: {
                        'X-API-KEY': GC_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        firstName: firstName,
                        lastName: lastName,
                        phone: phone,
                        // WhatsApp can be stored in custom fields if needed
                    })
                });
                
                if (!contactResponse.ok) {
                    const error = await contactResponse.text();
                    throw new Error('Failed to create contact: ' + error);
                }
                
                // Step 2: Fire the incubator-registration tag
                const tagResponse = await fetch(`${GC_API_URL}/tags/fire-tag/${TAG_ID}`, {
                    method: 'POST',
                    headers: {
                        'X-API-KEY': GC_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });
                
                if (!tagResponse.ok) {
                    const error = await tagResponse.text();
                    throw new Error('Failed to fire tag: ' + error);
                }
                
                // Success
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <strong>✓ Sync Successful!</strong><br>
                    Contact created for ${fullName} (${email})<br>
                    Tag "incubator-registration" applied.
                `;
                
                // Clear form
                document.getElementById('syncForm').reset();
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <strong>✗ Sync Failed</strong><br>
                    ${error.message}
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sync to Global Control';
            }
        });
    </script>
</body>
</html>
