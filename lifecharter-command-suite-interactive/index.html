<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCharter Command Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --deep-indigo: #1F315B;
            --royal-plum: #5E3B6C;
            --sacred-teal: #2E7C83;
            --soft-lavender: #CDBED6;
            --warm-gold: #D4AF63;
            --ivory-light: #F6F1E8;
            --soft-taupe: #B9A9A9;
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            color: var(--ivory-light);
            line-height: 1.6;
            min-height: 100vh;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: rgba(31, 49, 91, 0.4);
            border: 1px solid rgba(212, 175, 99, 0.2);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(10px);
        }

        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo-icon { font-size: 48px; margin-bottom: 16px; }
        .auth-logo h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--warm-gold);
            margin-bottom: 8px;
        }
        .auth-logo p { color: rgba(246, 241, 232, 0.6); font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(246, 241, 232, 0.8);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(246, 241, 232, 0.05);
            border: 1px solid rgba(246, 241, 232, 0.15);
            border-radius: 10px;
            color: var(--ivory-light);
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--warm-gold);
            background: rgba(246, 241, 232, 0.08);
        }
        .form-group input::placeholder { color: rgba(246, 241, 232, 0.3); }

        .btn {
            width: 100%;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--warm-gold), #c49b4a);
            color: var(--deep-indigo);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212, 175, 99, 0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: rgba(246, 241, 232, 0.1);
            color: var(--ivory-light);
            border: 1px solid rgba(246, 241, 232, 0.2);
        }
        .btn-secondary:hover { background: rgba(246, 241, 232, 0.15); }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(246, 241, 232, 0.1);
        }
        .auth-footer p { color: rgba(246, 241, 232, 0.6); font-size: 14px; }
        .auth-footer a { color: var(--warm-gold); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error-message.show { display: block; }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(31, 49, 91, 0.3);
            border-top-color: var(--deep-indigo);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading .loading-spinner { display: inline-block; }
        .loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: none; }

        /* Top Navigation - Utilities Only */
        .top-nav {
            background: rgba(31, 49, 91, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 99, 0.2);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 40px; }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--warm-gold);
            letter-spacing: 1px;
            cursor: pointer;
        }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-icon {
            background: none;
            border: none;
            color: rgba(246, 241, 232, 0.7);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 18px;
            position: relative;
        }
        .btn-icon:hover { background: rgba(212, 175, 99, 0.1); color: var(--ivory-light); }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            position: relative;
        }
        .user-menu:hover { background: rgba(212, 175, 99, 0.1); }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--warm-gold), var(--sacred-teal));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--deep-indigo);
            font-size: 14px;
        }
        .user-name { font-size: 14px; font-weight: 500; }
        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(31, 49, 91, 0.98);
            border: 1px solid rgba(212, 175, 99, 0.2);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 180px;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .user-dropdown.show { display: block; }
        .user-dropdown-item {
            padding: 12px 16px;
            color: rgba(246, 241, 232, 0.8);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .user-dropdown-item:hover { background: rgba(212, 175, 99, 0.1); color: var(--ivory-light); }

        /* Search Bar in Top Nav */
        .nav-search {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(246, 241, 232, 0.05);
            border: 1px solid rgba(212, 175, 99, 0.2);
            border-radius: 10px;
            padding: 10px 16px;
            min-width: 300px;
        }
        .nav-search input {
            background: none;
            border: none;
            color: var(--ivory-light);
            font-size: 14px;
            outline: none;
            width: 100%;
        }
        .nav-search input::placeholder { color: rgba(246, 241, 232, 0.4); }

        .app-container {
            display: flex;
            margin-top: 70px;
            min-height: calc(100vh - 70px);
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: rgba(31, 49, 91, 0.5);
            border-right: 1px solid rgba(212, 175, 99, 0.1);
            padding: 20px 0;
            position: fixed;
            height: calc(100vh - 70px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sidebar-section { margin-bottom: 8px; }
        .sidebar-heading {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(246, 241, 232, 0.5);
            padding: 16px 24px 8px;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: rgba(246, 241, 232, 0.7);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            cursor: pointer;
            background: none;
            border-top: none;
            border-right: none;
            border-bottom: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .sidebar-link:hover { background: rgba(212, 175, 99, 0.05); color: var(--ivory-light); }
        .sidebar-link.active {
            background: rgba(212, 175, 99, 0.1);
            color: var(--warm-gold);
            border-left-color: var(--warm-gold);
        }
        .sidebar-link-icon { font-size: 18px; width: 24px; text-align: center; }
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: auto;
        }
        .progress-dot.complete { background: var(--success); }
        .progress-dot.in-progress { background: var(--warning); }
        .progress-dot.not-started { background: rgba(246, 241, 232, 0.2); }

        /* Accordion Styles */
        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 12px 24px;
            background: rgba(212, 175, 99, 0.05);
            border: none;
            border-left: 3px solid transparent;
            color: var(--ivory-light);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .accordion-header:hover { background: rgba(212, 175, 99, 0.1); }
        .accordion-header.active {
            border-left-color: var(--warm-gold);
            background: rgba(212, 175, 99, 0.1);
            color: var(--warm-gold);
        }
        .accordion-icon {
            font-size: 12px;
            transition: transform 0.3s;
        }
        .accordion-content {
            display: none;
        }
        .accordion-content.open {
            display: block;
        }

        /* Sidebar Bottom Utility Links */
        .sidebar-bottom {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 99, 0.1);
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
        }

        /* Breadcrumb Navigation */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: rgba(246, 241, 232, 0.6);
        }
        .breadcrumb a {
            color: rgba(246, 241, 232, 0.6);
            text-decoration: none;
            cursor: pointer;
        }
        .breadcrumb a:hover { color: var(--warm-gold); }
        .breadcrumb-separator { color: rgba(246, 241, 232, 0.3); }
        .breadcrumb-current { color: var(--ivory-light); font-weight: 500; }

        .welcome-section { margin-bottom: 40px; }
        .welcome-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--ivory-light), var(--warm-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .welcome-subtitle {
            color: rgba(246, 241, 232, 0.7);
            font-size: 18px;
            max-width: 600px;
        }

        .progress-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .progress-card {
            background: rgba(31, 49, 91, 0.4);
            border: 1px solid rgba(212, 175, 99, 0.15);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s;
        }
        .progress-card:hover { border-color: rgba(212, 175, 99, 0.3); transform: translateY(-2px); }
        .progress-number {
            font-size: 48px;
            font-weight: 700;
            color: var(--warm-gold);
            font-family: 'Cormorant Garamond', serif;
        }
        .progress-label {
            font-size: 13px;
            color: rgba(246, 241, 232, 0.6);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        .workspace-card {
            background: rgba(31, 49, 91, 0.3);
            border: 1px solid rgba(212, 175, 99, 0.1);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .workspace-card:hover {
            border-color: rgba(212, 175, 99, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .workspace-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--warm-gold), var(--sacred-teal));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .workspace-card:hover::before { opacity: 1; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: rgba(212, 175, 99, 0.1);
        }
        .card-status {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-complete { background: rgba(76, 175, 80, 0.15); color: var(--success); }
        .status-progress { background: rgba(255, 152, 0, 0.15); color: var(--warning); }
        .status-locked { background: rgba(246, 241, 232, 0.1); color: rgba(246, 241, 232, 0.5); }
        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--ivory-light);
        }
        .card-description {
            color: rgba(246, 241, 232, 0.6);
            font-size: 15px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .card-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: rgba(246, 241, 232, 0.5);
        }
        .card-meta span { display: flex; align-items: center; gap: 6px; }
        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .card-actions .btn { width: auto; padding: 12px 24px; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(246, 241, 232, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--warm-gold), var(--sacred-teal));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
        }

        .activity-section {
            margin-top: 40px;
            background: rgba(31, 49, 91, 0.3);
            border: 1px solid rgba(212, 175, 99, 0.1);
            border-radius: 20px;
            padding: 30px;
        }
        .activity-list { list-style: none; margin-top: 20px; }
        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(246, 241, 232, 0.1);
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(212, 175, 99, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .activity-content { flex: 1; }
        .activity-text { font-size: 14px; color: var(--ivory-light); }
        .activity-time { font-size: 12px; color: rgba(246, 241, 232, 0.5); margin-top: 4px; }

        /* Mobile Sidebar Toggle */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--ivory-light);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        /* Mobile Sidebar Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        @media (max-width: 1200px) {
            .workspace-grid { grid-template-columns: 1fr; }
            .progress-overview { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle { display: block; }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 100;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay.open {
                display: block;
            }
            .main-content { margin-left: 0; padding: 20px; }
            .nav-search { display: none; }
            .top-nav { padding: 0 20px; }
            .welcome-title { font-size: 32px; }
            .auth-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">🦋</div>
                <h1>LifeCharter Command Suite</h1>
                <p>Build your sacred operating system</p>
            </div>
            <div id="login-error" class="error-message"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required placeholder="••••••••" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">Sign In</span>
                </button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="#" onclick="showSignup(); return false;">Create one</a></p>
                <p style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(212, 175, 99, 0.1);">
                    <button type="button" onclick="quickDemoLogin()" style="background: transparent; border: 1px solid rgba(212, 175, 99, 0.3); color: var(--warm-gold); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;">⚡ Quick Demo Login</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Signup Page -->
    <div id="signup-page" class="auth-container" style="display: none;">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">🦋</div>
                <h1>Create Your Account</h1>
                <p>Start building your Command Suite</p>
            </div>
            <div id="signup-error" class="error-message"></div>
            <form id="signup-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="signup-firstname">First Name</label>
                        <input type="text" id="signup-firstname" name="firstName" placeholder="Jane">
                    </div>
                    <div class="form-group">
                        <label for="signup-lastname">Last Name</label>
                        <input type="text" id="signup-lastname" name="lastName" placeholder="Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" name="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="signup-business">Business Name (Optional)</label>
                    <input type="text" id="signup-business" name="businessName" placeholder="Your Business">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" required placeholder="••••••••" minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" id="signup-btn">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">Create Account</span>
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="#" onclick="showLogin()">Sign in</a></p>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app">
        <nav class="top-nav">
            <div class="nav-left">
                <button class="mobile-menu-toggle" onclick="toggleMobileSidebar()">☰</button>
                <div class="logo" onclick="showCommandCenter()">⚡ COMMAND SUITE</div>
            </div>
            
            <!-- Search Bar -->
            <div class="nav-search">
                <span>🔍</span>
                <input type="text" placeholder="Search / Ask Command Suite..." id="global-search">
            </div>
            
            <div class="nav-right" style="position: relative;">
                <!-- Notifications Bell -->
                <button class="btn-icon" id="notifications-btn" title="Notifications" onclick="toggleNotifications()" style="position: relative;">
                    🔔
                    <span id="notification-badge" style="position: absolute; top: -4px; right: -4px; background: var(--sacred-teal); color: white; font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 10px; min-width: 16px; display: none; align-items: center; justify-content: center;">0</span>
                </button>
                
                <!-- Notifications Panel -->
